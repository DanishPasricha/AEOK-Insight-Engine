═══════════════════════════════════════════════════════════════
DIAGRAM STRUCTURE RULES
═══════════════════════════════════════════════════════════════

1. CLUSTER HIERARCHY (use `Cluster` for grouping):
   - Outermost: Cluster("Kubernetes Cluster", graph_attr={"style": "dashed"})
   - Inside: Cluster("ArcGIS Namespace")
   - Inside namespace: group components by tier using sub-Clusters:
   - IMPORTANT: Cluster does NOT accept a `style` keyword. Always use graph_attr dict:
     - "Services Tier" — Portal, Server, Feature Server, Map Server, Geocode, Sharing, Catalog
     - "Management & Tools" — Admin, Queue, Indexer, Metrics, System Tools, Logs
     - "Data Stores" — Relational, Object Store, Tile Cache, Spatio Temporal
   - Outside cluster: Clients, Container Registry, Supported Platforms

2. EDGE RULES:
   - Use Edge(color="...", style="...", label="...") for connections
   - Client → Proxy: color="#4a90d9"
   - Proxy → Ingress: color="#2c5f8a", style="bold"
   - Ingress → Services: color="#2c5f8a"
   - Service → Datastore: color="#8e44ad", style="bold"
   - Datastore → Storage: color="#555"
   - Management links: color="#666"
   - External/dashed: color="#aaa", style="dashed"

3. GRAPH ATTRIBUTES:
   graph_attr = {
       "fontsize": "24",
       "bgcolor": "#f5f7fa",
       "pad": "0.5",
       "nodesep": "0.7",
       "ranksep": "1.0",
   }

4. DIRECTION:
   - Full architecture: direction="TB" (top to bottom)
   - Data flow diagrams: direction="LR" (left to right)
   - Component detail: direction="TB"

═══════════════════════════════════════════════════════════════
DIAGRAM TYPE SELECTION
═══════════════════════════════════════════════════════════════

Based on the input JSON's doc_type, generate the appropriate diagram:

- "architecture_overview" → Full architecture with all components, clusters, and connections
- "deployment_guide" → Deployment topology showing infrastructure layers, platforms, and the deployment flow
- "troubleshooting" → Highlight affected components with red edges (color="#e74c3c"), show investigation path
- "configuration" → Component detail diagram focused on the configured component
- "tutorial" → Data flow diagram showing the workflow steps
- "release_notes" → Component detail diagram highlighting new/changed components

If doc_type is unclear, default to full architecture.

═══════════════════════════════════════════════════════════════
ADAPTATION RULES
═══════════════════════════════════════════════════════════════

- ONLY include components present in the input JSON. Never add components not mentioned.
- If fewer than 5 components → skip the tier-based sub-Clusters, lay components flat
- If no data stores mentioned → omit the Data Stores cluster
- If no platform specified → omit the Supported Platforms cluster
- If relationships exist in JSON → create Edge connections for each
- If data_flows exist → add numbered Edge labels showing the flow sequence
- If configuration_parameters exist → you may add them as labels on relevant edges
- For troubleshooting content → use color="#e74c3c" (red) edges and style="bold" on affected paths

